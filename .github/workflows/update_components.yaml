name: "Update component database"
on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
permissions:
  contents: write
concurrency:
  group: update-components-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build_and_update:
    name: "Update component database and frontend"
    runs-on: ubuntu-24.04
    environment: github-pages
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip nodejs npm wget zip unzip p7zip-full
          sudo pip3 install requests click
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build frontend
        run: |
          cd web
          if [ "$GITHUB_REPOSITORY" = 'yaqwsx/jlcparts-dev' ]; then
            export BASEURL=https://jlcparts-dev.honzamrazek.cz
          else
            export BASEURL=https://yaqwsx.github.io/jlcparts
          fi
          npm install --silent
          NODE_ENV=production PUBLIC_URL=${BASEURL} npm run build
          if [ $GITHUB_REPOSITORY = 'yaqwsx/jlcparts-dev' ]; then
            echo 'jlcparts-dev.honzamrazek.cz' > build/CNAME
          fi
          touch build/.nojekyll
      - name: Update database
        env: # Or as an environment variable
          LCSC_KEY: ${{ secrets.LCSC_KEY }}
          LCSC_SECRET: ${{ secrets.LCSC_SECRET }}
          JLCPCB_APP_ID: ${{ secrets.JLCPCB_APP_ID }}
          JLCPCB_ACCESS_KEY: ${{ secrets.JLCPCB_ACCESS_KEY }}
          JLCPCB_SECRET_KEY: ${{ secrets.JLCPCB_SECRET_KEY }}
        run: |
          set -x
          sudo pip3 install -e .

          if [ "$GITHUB_REPOSITORY" = 'yaqwsx/jlcparts-dev' ]; then
            export BASEURL=https://jlcparts-dev.honzamrazek.cz
          else
            export BASEURL=https://yaqwsx.github.io/jlcparts
          fi
          export DATAURL=${BASEURL}/data

          if wget -q ${DATAURL}/cache.zip; then
            downloaded_parts=()
            part=1
            while true; do
              if [ "$part" -le 99 ]; then
                suffix=$(printf "%02d" "$part")
              else
                suffix="$part"
              fi
              name="cache.z${suffix}"
              if wget -q "${DATAURL}/${name}"; then
                downloaded_parts+=("${name}")
                part=$((part + 1))
                continue
              fi
              rm -f "${name}"
              break
            done

            7z x cache.zip
            rm -f cache.zip
            if [ ${#downloaded_parts[@]} -gt 0 ]; then
              rm -f "${downloaded_parts[@]}"
            fi
          else
            rm -f cache.zip
            echo "No published cache found, bootstrapping a fresh database"
          fi

          wget -q ${DATAURL}/parts.checkpoint.json || rm -f parts.checkpoint.json

          fetch_seconds=${JLCPARTS_FETCH_SECONDS:-2400}
          lcsc_age=${JLCPARTS_LCSC_AGE:-10000}
          lcsc_limit=${JLCPARTS_LCSC_LIMIT:-1000}
          jlcparts fetchdb --verbose \
                           --checkpoint parts.checkpoint.json \
                           --max-seconds "$fetch_seconds" \
                           --age "$lcsc_age" \
                           --limit "$lcsc_limit" \
                           cache.sqlite3
          jlcparts updatepreferred cache.sqlite3
          jlcparts buildtables --jobs 0 \
                               --ignoreoldstock 120 \
                               cache.sqlite3 web/build/data

          if [ -f parts.checkpoint.json ]; then
            cp parts.checkpoint.json web/build/data/parts.checkpoint.json
          fi

          rm -f web/build/data/cache.z*
          zip -s 50m web/build/data/cache.zip cache.sqlite3
      - name: Tar artifact # Artifact are case insensitive, this is workaround
        run: tar -czf web_build.tar.gz web/build/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: web_build.tar.gz
          retention-days: 14
  deploy:
    name: "Deploy"
    runs-on: ubuntu-24.04
    needs: build_and_update
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout # Required for GH-pages deployment
        uses: actions/checkout@v3
      - name: "Download web"
        uses: actions/download-artifact@v4
        with:
          name: web_build
      - name: Untar artifact
        run: tar -xzf web_build.tar.gz
      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4.4.3
        with:
          branch: gh-pages
          folder: web/build
          single-commit: true
